version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: anti-fraud-db
    environment:
      POSTGRES_USER: ${DB_USER:-fraud_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fraud_password}
      POSTGRES_DB: ${DB_NAME:-anti_fraud_platform}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fraud_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anti-fraud-network

  redis:
    image: redis:7-alpine
    container_name: anti-fraud-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - anti-fraud-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anti-fraud-api
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-fraud_user}
      DB_PASSWORD: ${DB_PASSWORD:-fraud_password}
      DB_NAME: ${DB_NAME:-anti_fraud_platform}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-secret}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - anti-fraud-network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: anti-fraud-web
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:3001
    volumes:
      - ./web:/app
      - /app/node_modules
    command: npm start
    networks:
      - anti-fraud-network

volumes:
  postgres_data:
  redis_data:

networks:
  anti-fraud-network:
    driver: bridge
